# ─────────────────────────────────────────────────────────────────────────────
# HotelixOS — Configuration Nginx du template établissement
# Emplacement cible : /etc/nginx/sites-available/default
#
# Config nginx minimaliste pour une app Laravel :
#   - try_files vers index.php (front controller)
#   - cache des assets statiques
#   - blocage des fichiers sensibles (.env, composer.json, artisan...)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen      80 default_server;
    listen      [::]:80 default_server;

    server_name _;
    root        /var/www/html/public;
    index       index.php index.html;

    charset     utf-8;

    # Taille max des uploads (logo, imports...)
    client_max_body_size 20M;

    # ── Logs ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Blocage des fichiers sensibles ──────────────────────────────────────
    # Fichiers cachés (.env, .git, .htaccess...)
    location ~ /\.(?!well-known).* {
        deny all;
    }
    # Manifestes et scripts applicatifs non destinés au public
    location ~ (?:composer\.(?:json|lock)|package(?:-lock)?\.json|artisan|\.md$) {
        deny all;
    }

    # ── Point d'entrée Laravel (front controller) ───────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Assets statiques (cache longue durée) ───────────────────────────────
    location ~* \.(js|css|png|jpe?g|gif|ico|svg|webp|avif|woff2?|ttf|eot|map)$ {
        try_files $uri =404;
        expires                 30d;
        access_log              off;
        add_header Cache-Control "public, immutable";
    }

    # ── PHP via FastCGI (php-fpm sur 127.0.0.1:9000) ────────────────────────
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Timeouts adaptés (exports, requêtes longues)
        fastcgi_connect_timeout 5s;
        fastcgi_read_timeout    60s;
        fastcgi_send_timeout    60s;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
